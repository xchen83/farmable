<div class="dashboard-container">
  <app-header></app-header>

  <!-- Notifications Section -->
  <div class="notification-section">
    <div class="section-header">
      <div class="header-title">
        <img src="assets/bell-02.svg" alt="Bell" />
        <h4>Notification</h4>
      </div>
      <span class="see-more">See More</span>
    </div>

    <div class="notification-list">
      <div *ngFor="let notification of notifications" 
           class="notification-item" 
           [ngClass]="{'low-stock': notification.type === 'low-in-stock'}">
        <p>{{notification.message}}</p>
        <app-tag *ngIf="notification.type === 'low-in-stock'" type="low-in-stock"></app-tag>
      </div>
    </div>
  </div>

  <!-- Inventory Section -->
  <div class="section-container">
    <div class="section-header">
      <div class="header-title">
        <img src="assets/file-02.svg" alt="File" />
        <h4>Inventory</h4>
      </div>
      <span class="see-more">See More</span>
    </div>

    <div class="inventory-list">
      <div *ngFor="let item of inventoryItems" class="inventory-item">
        <h3>{{item.name}}</h3>
        <p>Remaining: {{item.remaining}}</p>
      </div>
    </div>

    <div class="divider"></div>

    <button class="add-button">
      <img src="assets/file-plus-02.svg" alt="Add" />
      <span>Add Inventory</span>
    </button>
  </div>

  <!-- Products Section -->
  <div class="section-container">
    <div class="section-header">
      <div class="header-title">
        <img src="assets/package.svg" alt="Package" />
        <h4>Product</h4>
      </div>
      <span class="see-more">See More</span>
    </div>

    <div class="product-list">
      <div *ngFor="let product of products" class="product-item">
        <div class="product-image" [style.background-image]="'url(' + product.image + ')'"></div>
        <div class="product-details">
          <h5>{{product.name}}</h5>
          <p>SKU: {{product.sku}}</p>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <button class="add-button">
      <img src="assets/circle.svg" alt="Add" />
      <span>Add Product</span>
    </button>
  </div>
</div>
